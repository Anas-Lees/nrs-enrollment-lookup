server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS, so the API hostname resolves at request time
    # (lets nginx start even if the API container isn't up yet).
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Proxy API calls to the backend service on the compose network.
    location /api/ {
        set $api_upstream api:8080;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Lightweight health endpoint for container/Kubernetes probes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Single-page-app history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
