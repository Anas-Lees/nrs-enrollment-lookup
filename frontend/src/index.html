<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>NRS Enrollment — Applicant Lookup</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Royal Oman Police — NRS Enrollment Applicant Lookup console for searching the national registry."
    />
    <meta name="theme-color" content="#14512f" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="alternate icon" href="favicon.ico" />
    <!-- Latin UI typeface: Inter. Arabic uses the self-hosted 29LT Azer (see styles.scss). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Apply the saved language/direction before Angular boots, so an Arabic-preference
         operator doesn't see a flash of left-to-right layout on first paint. -->
    <script>
      try {
        if (localStorage.getItem('nrs.lang') === 'ar') {
          document.documentElement.lang = 'ar';
          document.documentElement.dir = 'rtl';
        }
      } catch (e) {
        /* localStorage unavailable (e.g. private mode) — fall back to the default. */
      }
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
