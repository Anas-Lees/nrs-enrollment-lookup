<header class="app-header">
  <a class="app-header__brand" routerLink="/search">
    <span class="app-header__mark" aria-hidden="true">NRS</span>
    <span class="app-header__title">{{ i18n.t('app.title') }}</span>
  </a>
  <nav class="app-header__nav">
    <a routerLink="/search" routerLinkActive="is-active">{{ i18n.t('nav.search') }}</a>
    <button type="button" class="lang-toggle" (click)="i18n.toggle()">
      {{ i18n.t('lang.toggle') }}
    </button>
  </nav>
</header>

<main class="app-main">
  <router-outlet />
</main>

<footer class="app-footer">
  <small>{{ i18n.t('footer') }}</small>
</footer>
