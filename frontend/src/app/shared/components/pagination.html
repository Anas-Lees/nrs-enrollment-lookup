<div class="pagination">
  <button type="button" class="pagination__btn" [disabled]="page() <= 1" (click)="prev()">
    {{ i18n.t('page.prev') }}
  </button>

  <span class="pagination__info">
    {{ i18n.t('page.showing') }} {{ rangeStart() }}–{{ rangeEnd() }} / {{ totalCount() }}
  </span>

  <span class="pagination__info">
    {{ i18n.t('page.page') }} {{ page() }} / {{ totalPages() }}
  </span>

  <button
    type="button"
    class="pagination__btn"
    [disabled]="page() >= totalPages()"
    (click)="next()"
  >
    {{ i18n.t('page.next') }}
  </button>

  @if (pageSizeOptions().length) {
    <label class="pagination__size">
      <span>{{ i18n.t('page.perPage') }}</span>
      <select [value]="pageSize()" (change)="onPageSizeChange($event)">
        @for (n of pageSizeOptions(); track n) {
          <option [value]="n">{{ n }}</option>
        }
      </select>
    </label>
  }
</div>
