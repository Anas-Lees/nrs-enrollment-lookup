openapi: 3.0.3
info:
  title: NRS Enrollment — Applicant Lookup API
  version: 1.0.0
  description: >
    Contract-first API for the NRS Enrollment "Applicant Lookup" feature.

    This document is the **single source of truth**: the backend implements it, the frontend
    mocks against it, and QA tests conformance to it. It is frozen in Sprint 0 and changed only
    through versioned, reviewed updates.

    An operator searches for a person (by CRN, name in Arabic or English, date of birth, and/or
    nationality) and opens a full profile that includes the person's ID cards and passports.

    All string fields support Unicode; Arabic name fields are returned alongside their English
    counterparts so the UI can render both (Arabic right-to-left).
  contact:
    name: NRS Enrollment Team
  license:
    name: MIT
    url: https://github.com/Anas-Lees/nrs-enrollment-lookup/blob/main/LICENSE

servers:
  - url: http://localhost:5000
    description: Local development (HTTP)
  - url: https://localhost:7001
    description: Local development (HTTPS)
  - url: https://api.nrs.example.gov.om
    description: Production (illustrative)

tags:
  - name: Persons
    description: Search for and retrieve person records.
  - name: Enrollments
    description: Create, edit and list enrollment applications.

paths:
  /api/v1/persons/search:
    get:
      tags: [Persons]
      operationId: searchPersons
      summary: Search persons (paged, multi-filter)
      description: >
        Returns a paginated list of persons matching the supplied filters. All filters are
        optional and combine with AND semantics. Name matching is a partial (contains) match
        across both Arabic and English name fields. With no filters, returns all persons paged.
      parameters:
        - name: crn
          in: query
          description: Civil Registration Number (8 or 9 digits). Exact or prefix match.
          required: false
          schema:
            type: string
            maxLength: 9
            example: "12345678"
        - name: name
          in: query
          description: Partial name match across Arabic and English first/family names.
          required: false
          schema:
            type: string
            maxLength: 100
            example: "Al"
        - name: dob
          in: query
          description: Date of birth (Gregorian), exact match.
          required: false
          schema:
            type: string
            format: date
            example: "1990-05-21"
        - name: nationality
          in: query
          description: Nationality code, ISO 3166-1 alpha-3.
          required: false
          schema:
            type: string
            minLength: 3
            maxLength: 3
            example: "OMN"
        - name: sort
          in: query
          description: >
            Result ordering (applied server-side, across all pages). Defaults to name A–Z.
          required: false
          schema:
            type: string
            enum: [name-asc, name-desc, dob-desc, dob-asc, crn-asc]
            default: name-asc
        - name: page
          in: query
          description: 1-based page number.
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          description: Number of items per page.
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: A page of matching persons.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedResultOfPersonSummary"
              example:
                items:
                  - civilNumber: "12345678"
                    firstNameAr: "محمد"
                    familyNameAr: "البلوشي"
                    firstNameEn: "Mohammed"
                    familyNameEn: "Al Balushi"
                    dateOfBirth: "1990-05-21"
                    gender: "M"
                    nationalityCode: "OMN"
                    nationalityNameEn: "Oman"
                    nationalityNameAr: "عُمان"
                    status: "ACTIVE"
                totalCount: 1
                page: 1
                pageSize: 20
        "400":
          description: Invalid query parameters.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/v1/persons/{crn}:
    get:
      tags: [Persons]
      operationId: getPersonByCrn
      summary: Get a person's full profile by CRN
      description: >
        Returns a single person's biographic data together with all related ID card and
        passport records.
      parameters:
        - name: crn
          in: path
          description: Civil Registration Number (8 or 9 digits).
          required: true
          schema:
            type: string
            maxLength: 9
            example: "12345678"
      responses:
        "200":
          description: The person's full profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
              example:
                civilNumber: "12345678"
                firstNameAr: "محمد"
                familyNameAr: "البلوشي"
                firstNameEn: "Mohammed"
                familyNameEn: "Al Balushi"
                dateOfBirth: "1990-05-21"
                gender: "M"
                nationalityCode: "OMN"
                nationalityNameEn: "Oman"
                nationalityNameAr: "عُمان"
                status: "ACTIVE"
                photoPath: "/photos/12345678.jpg"
                placeOfBirthEn: "Muscat"
                placeOfBirthAr: "مسقط"
                motherNameEn: "Fatma Al-Saadi"
                motherNameAr: "فاطمة السعدي"
                maritalStatus: "MARRIED"
                bloodType: "O+"
                occupationEn: "Engineer"
                occupationAr: "مهندس"
                address:
                  governorate: "Muscat"
                  wilayat: "Seeb"
                  village: "Al Khoudh"
                  street: "Street 12"
                  buildingNumber: "45"
                  postalCode: "133"
                contact:
                  mobile: "+96891234567"
                  email: "mohammed.albalushi@example.com"
                idCards:
                  - idCardId: 1001
                    civilNumber: "12345678"
                    cardNumber: "ID-0099887766"
                    issueDate: "2021-03-01"
                    expiryDate: "2031-03-01"
                    status: "ACTIVE"
                    cardType: "OMANI"
                passports:
                  - passportId: 2001
                    civilNumber: "12345678"
                    passportNumber: "P1234567"
                    passportType: "ORDINARY"
                    issueDate: "2022-07-15"
                    expiryDate: "2032-07-14"
                    status: "ACTIVE"
        "404":
          description: No person exists with the supplied CRN.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/v1/persons/{crn}/contact-details:
    put:
      tags: [Persons]
      operationId: updatePersonContactDetails
      summary: Set a person's address and contact details
      description: >
        Sets the residential address and contact details for a person, returning their
        refreshed profile. A freshly-registered applicant is created from the enrollment form
        without an address or contact; an operator uses this endpoint to fill those in (and to
        correct them later). The address and contact rows are created on the first save.
      parameters:
        - name: crn
          in: path
          description: Civil Registration Number (8 or 9 digits).
          required: true
          schema:
            type: string
            maxLength: 9
            example: "12345678"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactDetailsRequest"
            example:
              governorate: "Muscat"
              wilayat: "Seeb"
              village: "Al Khoudh"
              street: "Street 12"
              buildingNumber: "45"
              postalCode: "133"
              mobile: "+96891234567"
              email: "applicant@example.com"
      responses:
        "200":
          description: The person's refreshed full profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "400":
          description: Invalid address or contact details.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: No person exists with the supplied CRN.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/v1/persons/{crn}/address:
    put:
      tags: [Persons]
      operationId: updatePersonAddress
      summary: Set a person's residential address (independent of contact)
      parameters:
        - name: crn
          in: path
          required: true
          schema: { type: string, maxLength: 9, example: "12345678" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAddressRequest"
      responses:
        "200":
          description: The person's refreshed full profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "400":
          description: Invalid address.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: No person exists with the supplied CRN.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/v1/persons/{crn}/contact:
    put:
      tags: [Persons]
      operationId: updatePersonContact
      summary: Set a person's contact details (independent of address)
      parameters:
        - name: crn
          in: path
          required: true
          schema: { type: string, maxLength: 9, example: "12345678" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactRequest"
      responses:
        "200":
          description: The person's refreshed full profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "400":
          description: Invalid contact details.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: No person exists with the supplied CRN.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/v1/enrollments:
    post:
      tags: [Enrollments]
      operationId: createEnrollment
      summary: Create a new enrollment application
      description: >
        Captures a new enrollment application (for a brand-new applicant, or continuing from an
        existing person's CRN). The application starts as SUBMITTED and an "enrollment submitted"
        event is published to the message broker for the review worker.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnrollmentRequest"
      responses:
        "201":
          description: The created enrollment application.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
        "400":
          description: Invalid request body.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    get:
      tags: [Enrollments]
      operationId: listEnrollments
      summary: List enrollment applications (paged, newest first)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnrollmentStatus"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: A page of enrollment applications.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedResultOfEnrollmentSummary"

  /api/v1/enrollments/{id}:
    get:
      tags: [Enrollments]
      operationId: getEnrollment
      summary: Get one enrollment application by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The enrollment application.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
        "404":
          description: No enrollment exists with the supplied id.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      tags: [Enrollments]
      operationId: updateEnrollment
      summary: Edit an existing enrollment application
      description: >
        Updates the editable fields of an enrollment. The status is driven by the review
        workflow, not by this endpoint. An "enrollment updated" event is published on success.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnrollmentRequest"
      responses:
        "200":
          description: The updated enrollment application.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
        "400":
          description: Invalid request body.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: No enrollment exists with the supplied id.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/v1/enrollments/{id}/decision:
    post:
      tags: [Enrollments]
      operationId: decideEnrollment
      summary: Approve or reject an enrollment you have claimed (assignee only)
      description: >
        Records a reviewer's decision on an enrollment they have claimed. Only the assignee may
        decide it. A reason is required when rejecting. The decision completes the Camunda review
        user task (or is applied directly with no engine), which sets the status to APPROVED or
        REJECTED and stamps the decision audit trail (decidedBy / decidedAtUtc / decisionNotes).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionRequest"
      responses:
        "200":
          description: The enrollment after the decision was applied (status settled).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
        "202":
          description: >
            The decision was accepted but the workflow has not applied it yet (the Camunda job
            is still settling). The returned enrollment is still under review; the queue will
            reflect the final status shortly.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
        "403":
          description: The caller is not the reviewer who claimed it, so may not decide it.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: No enrollment exists with the supplied id.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: The enrollment is not under review, so it cannot be decided.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/v1/enrollments/{id}/request-corrections:
    post:
      tags: [Enrollments]
      operationId: requestCorrections
      summary: Send a claimed application back to the operator for corrections (assignee only)
      description: >
        The third review outcome alongside approve and reject. The reviewer who claimed the
        application sends it back with a note describing what must be fixed; the application
        settles to NEEDS_CORRECTION and the Camunda process waits for a resubmission (or
        auto-closes when the correction deadline passes).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note:
                  type: string
                  description: What the operator must fix (required).
      responses:
        "200":
          description: The enrollment after it moved to NEEDS_CORRECTION.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Enrollment" }
        "202":
          description: Accepted but the workflow has not applied it yet.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Enrollment" }
        "403":
          description: The caller is not the reviewer who claimed it.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "404":
          description: No enrollment exists with the supplied id.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "409":
          description: The enrollment is not under review.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /api/v1/enrollments/{id}/resubmit:
    post:
      tags: [Enrollments]
      operationId: resubmitEnrollment
      summary: Resubmit a corrected application for review
      description: >
        The operator resubmits an application a reviewer sent back for corrections. It re-enters
        automated screening (and, if still flagged, the review queue) via a Camunda message that
        loops the process back. The reviewer's correction note is cleared.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: The enrollment after it was resubmitted (back to SUBMITTED/PENDING_REVIEW).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Enrollment" }
        "404":
          description: No enrollment exists with the supplied id.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "409":
          description: The application is not awaiting corrections.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /api/v1/enrollments/{id}/withdraw:
    post:
      tags: [Enrollments]
      operationId: withdrawEnrollment
      summary: Withdraw an application before it is decided
      description: >
        The operator withdraws an application (the applicant pulled out, or it was captured in
        error). This cancels the review wherever it is — via an interrupting Camunda message that
        ends the whole process instance — and settles the application to WITHDRAWN.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  nullable: true
                  description: Optional reason for the withdrawal.
      responses:
        "200":
          description: The enrollment after it was withdrawn.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Enrollment" }
        "202":
          description: Accepted but the workflow has not applied it yet.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Enrollment" }
        "404":
          description: No enrollment exists with the supplied id.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "409":
          description: The application has already been concluded.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /api/v1/review-tasks:
    get:
      tags: [Review tasks]
      operationId: listReviewTasks
      summary: List reviews in progress and waiting, oldest first (reviewer role)
      description: >
        The reviewer's work queue, driven by enrollment status: everything PENDING_REVIEW
        (waiting, unassigned) or UNDER_REVIEW (claimed). The client groups it into available /
        assigned-to-me / with-others by the assignee.
      responses:
        "200":
          description: Reviews in progress and waiting, oldest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReviewTask"

  /api/v1/review-tasks/{id}/claim:
    post:
      tags: [Review tasks]
      operationId: claimReviewTask
      summary: Claim a pending review, taking ownership (reviewer role)
      description: >
        Atomically moves a PENDING_REVIEW enrollment to UNDER_REVIEW and stamps the caller as
        its assignee. Only the assignee may later decide or release it.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The review is now assigned to the caller.
          content:
            application/json:
              schema:
                type: object
                properties:
                  assignee:
                    type: string
        "404":
          description: No enrollment exists with that id.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: Already claimed by another reviewer, or no longer waiting.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/v1/review-tasks/{id}/release:
    post:
      tags: [Review tasks]
      operationId: releaseReviewTask
      summary: Release a claimed review back to the queue (assignee only)
      description: >
        The inverse of a claim: moves the caller's UNDER_REVIEW enrollment back to
        PENDING_REVIEW, unassigned. Only the assignee may release it.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Released back to the shared queue.
        "403":
          description: The caller is not the assignee.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: No enrollment exists with that id.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/v1/card-office:
    get:
      tags: [Card office]
      operationId: listCardOffice
      summary: List cards in production and awaiting collection
      description: >
        The card office's work queue, driven by card status: everything IN_PRODUCTION (to be
        printed) or READY_FOR_COLLECTION (to be handed over). Only cards issued through the
        review workflow appear here.
      responses:
        "200":
          description: Cards in production and awaiting collection.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CardTask"

  /api/v1/card-office/{cardId}/printed:
    post:
      tags: [Card office]
      operationId: markCardPrinted
      summary: Mark a card printed — it becomes ready for collection
      description: >
        Completes the Camunda "print card" user task, advancing the card to
        READY_FOR_COLLECTION (or applying it directly with no engine).
      parameters:
        - name: cardId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: The card advanced to ready-for-collection.
        "202":
          description: Accepted but the workflow has not applied the next status yet.
        "404":
          description: No workflow-issued card exists with that id.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "409":
          description: The card is not in production.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /api/v1/card-office/{cardId}/collected:
    post:
      tags: [Card office]
      operationId: markCardCollected
      summary: Mark a card collected — it becomes active
      description: >
        Completes the Camunda "hand over card" user task, activating the card (and superseding
        any previous card for the holder), or applying it directly with no engine.
      parameters:
        - name: cardId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: The card was activated.
        "202":
          description: Accepted but the workflow has not applied the next status yet.
        "404":
          description: No workflow-issued card exists with that id.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "409":
          description: The card is not awaiting collection.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /api/v1/notifications:
    get:
      tags: [Notifications]
      operationId: listNotifications
      summary: List the caller's notifications (newest first) with the unread count
      description: >
        Notifications are addressed to a username (e.g. the operator who submitted an
        application) or to a role (reviewer, supervisor); the caller sees the union of both.
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: The caller's notifications.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationList"

  /api/v1/notifications/{id}/read:
    post:
      tags: [Notifications]
      operationId: markNotificationRead
      summary: Mark one notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Marked read.
        "404":
          description: No notification with that id is addressed to the caller.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/v1/notifications/read-all:
    post:
      tags: [Notifications]
      operationId: markAllNotificationsRead
      summary: Mark all of the caller's notifications as read
      responses:
        "200":
          description: How many notifications were marked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  marked:
                    type: integer

  /api/v1/reports/enrollment-summary:
    get:
      tags: [Reports]
      operationId: enrollmentSummaryReport
      summary: Enrollment review analytics for the last N days (supervisor role)
      description: >
        Aggregate KPIs computed from the review workflow's data: throughput, auto-approval
        (straight-through) rate, approval/rejection rates, average time-to-decision, SLA
        escalation rate, screening-flag frequency, per-reviewer workload, and a daily trend.
        Aggregate figures only (no PII).
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 365
      responses:
        "200":
          description: The enrollment analytics summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentReport"

components:
  schemas:
    PersonSummary:
      type: object
      description: One row in the search results table.
      required:
        - civilNumber
        - firstNameAr
        - familyNameAr
        - firstNameEn
        - familyNameEn
        - dateOfBirth
        - gender
        - nationalityCode
        - status
      properties:
        civilNumber:
          type: string
          description: Civil Registration Number (CRN), primary key.
          example: "12345678"
        firstNameAr:
          type: string
          description: Arabic first name (RTL).
          example: "محمد"
        familyNameAr:
          type: string
          description: Arabic family name (RTL).
          example: "البلوشي"
        firstNameEn:
          type: string
          example: "Mohammed"
        familyNameEn:
          type: string
          example: "Al Balushi"
        dateOfBirth:
          type: string
          format: date
          example: "1990-05-21"
        gender:
          $ref: "#/components/schemas/Gender"
        nationalityCode:
          type: string
          description: ISO 3166-1 alpha-3.
          example: "OMN"
        nationalityNameEn:
          type: string
          nullable: true
          description: English nationality name, resolved from the lookup.
          example: "Oman"
        nationalityNameAr:
          type: string
          nullable: true
          description: Arabic nationality name, resolved from the lookup.
          example: "عُمان"
        status:
          $ref: "#/components/schemas/PersonStatus"

    Person:
      description: Full person profile, including related documents.
      allOf:
        - $ref: "#/components/schemas/PersonSummary"
        - type: object
          properties:
            photoPath:
              type: string
              nullable: true
              description: Path to the face photo (placeholder for the POC).
              example: "/photos/12345678.jpg"
            placeOfBirthEn:
              type: string
              nullable: true
              example: "Muscat"
            placeOfBirthAr:
              type: string
              nullable: true
              example: "مسقط"
            motherNameEn:
              type: string
              nullable: true
              example: "Fatma Al-Saadi"
            motherNameAr:
              type: string
              nullable: true
              example: "فاطمة السعدي"
            maritalStatus:
              $ref: "#/components/schemas/MaritalStatus"
            bloodType:
              type: string
              nullable: true
              description: ABO/Rh blood group.
              example: "O+"
            occupationEn:
              type: string
              nullable: true
              example: "Engineer"
            occupationAr:
              type: string
              nullable: true
              example: "مهندس"
            address:
              allOf:
                - $ref: "#/components/schemas/Address"
              nullable: true
            contact:
              allOf:
                - $ref: "#/components/schemas/Contact"
              nullable: true
            idCards:
              type: array
              items:
                $ref: "#/components/schemas/IdCard"
            passports:
              type: array
              items:
                $ref: "#/components/schemas/Passport"

    IdCard:
      type: object
      required: [idCardId, civilNumber, cardNumber, status, cardType]
      properties:
        idCardId:
          type: integer
          format: int64
          example: 1001
        civilNumber:
          type: string
          example: "12345678"
        cardNumber:
          type: string
          example: "ID-0099887766"
        issueDate:
          type: string
          format: date
          nullable: true
        expiryDate:
          type: string
          format: date
          nullable: true
        status:
          $ref: "#/components/schemas/CardStatus"
        cardType:
          $ref: "#/components/schemas/CardType"

    Passport:
      type: object
      required: [passportId, civilNumber, passportNumber, passportType, status]
      properties:
        passportId:
          type: integer
          format: int64
          example: 2001
        civilNumber:
          type: string
          example: "12345678"
        passportNumber:
          type: string
          example: "P1234567"
        passportType:
          $ref: "#/components/schemas/PassportType"
        issueDate:
          type: string
          format: date
          nullable: true
        expiryDate:
          type: string
          format: date
          nullable: true
        status:
          $ref: "#/components/schemas/PassportStatus"

    Address:
      type: object
      description: A person's current residential address.
      required: [governorate, wilayat]
      properties:
        governorate:
          type: string
          example: "Muscat"
        wilayat:
          type: string
          example: "Seeb"
        village:
          type: string
          nullable: true
          example: "Al Khoudh"
        street:
          type: string
          nullable: true
          example: "Street 12"
        buildingNumber:
          type: string
          nullable: true
          example: "45"
        postalCode:
          type: string
          nullable: true
          example: "133"

    Contact:
      type: object
      description: A person's contact details.
      properties:
        mobile:
          type: string
          nullable: true
          example: "+96891234567"
        email:
          type: string
          nullable: true
          example: "mohammed.albalushi@example.com"

    UpdateContactDetailsRequest:
      type: object
      description: >
        Operator-supplied residential address and contact details for a person. The governorate
        must be one of Oman's 11 governorates (English name); address fields are Latin text.
      required: [governorate, wilayat]
      properties:
        governorate:
          type: string
          maxLength: 50
          description: One of Oman's 11 governorates (English name).
          example: "Muscat"
        wilayat:
          type: string
          maxLength: 50
          example: "Seeb"
        village:
          type: string
          nullable: true
          maxLength: 80
          example: "Al Khoudh"
        street:
          type: string
          nullable: true
          maxLength: 120
          example: "Street 12"
        buildingNumber:
          type: string
          nullable: true
          maxLength: 20
          example: "45"
        postalCode:
          type: string
          nullable: true
          maxLength: 10
          example: "133"
        mobile:
          type: string
          nullable: true
          maxLength: 20
          example: "+96891234567"
        email:
          type: string
          nullable: true
          maxLength: 120
          example: "applicant@example.com"

    UpdateAddressRequest:
      type: object
      description: Operator-supplied residential address (edited independently of contact).
      required: [governorate, wilayat]
      properties:
        governorate: { type: string, maxLength: 50, example: "Muscat" }
        wilayat: { type: string, maxLength: 50, example: "Seeb" }
        village: { type: string, nullable: true, maxLength: 80 }
        street: { type: string, nullable: true, maxLength: 120 }
        buildingNumber: { type: string, nullable: true, maxLength: 20 }
        postalCode: { type: string, nullable: true, maxLength: 10 }

    UpdateContactRequest:
      type: object
      description: Operator-supplied contact details (edited independently of the address).
      properties:
        mobile: { type: string, nullable: true, maxLength: 20, example: "+96891234567" }
        email: { type: string, nullable: true, maxLength: 120 }

    PagedResultOfPersonSummary:
      type: object
      description: A page of results plus the total count for pagination controls.
      required: [items, totalCount, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PersonSummary"
        totalCount:
          type: integer
          format: int32
          description: Total number of matches across all pages.
          example: 137
        page:
          type: integer
          format: int32
          example: 1
        pageSize:
          type: integer
          format: int32
          example: 20

    CreateEnrollmentRequest:
      type: object
      description: >
        Body for creating or editing an enrollment application. Captures the full applicant
        record so an approved application provisions a complete registry person (no empty
        fields): biographic data, residential address, contact, and an optional passport.
      required:
        [
          firstNameEn,
          familyNameEn,
          firstNameAr,
          familyNameAr,
          dateOfBirth,
          nationalityCode,
          type,
          placeOfBirthEn,
          placeOfBirthAr,
          motherNameEn,
          motherNameAr,
          governorate,
          wilayat,
          mobile,
        ]
      properties:
        civilNumber:
          type: string
          nullable: true
          description: CRN of an existing person to continue from, or null for a new applicant.
          example: "12345678"
        firstNameEn:
          type: string
          example: "Salim"
        familyNameEn:
          type: string
          example: "Al Harthy"
        firstNameAr:
          type: string
          example: "سالم"
        familyNameAr:
          type: string
          example: "الحارثي"
        dateOfBirth:
          type: string
          format: date
          example: "1990-05-14"
        gender:
          type: string
          nullable: true
          enum: [M, F]
          example: "M"
        nationalityCode:
          type: string
          minLength: 3
          maxLength: 3
          example: "OMN"
        type:
          $ref: "#/components/schemas/EnrollmentType"
        placeOfBirthEn:
          type: string
          maxLength: 80
          example: "Muscat"
        placeOfBirthAr:
          type: string
          maxLength: 80
          example: "مسقط"
        motherNameEn:
          type: string
          maxLength: 150
          example: "Fatma Al-Saadi"
        motherNameAr:
          type: string
          maxLength: 150
          example: "فاطمة السعدي"
        maritalStatus:
          nullable: true
          allOf: [{ $ref: "#/components/schemas/MaritalStatus" }]
        bloodType:
          type: string
          nullable: true
          maxLength: 3
          example: "O+"
        occupationEn:
          type: string
          nullable: true
          maxLength: 100
        occupationAr:
          type: string
          nullable: true
          maxLength: 100
        governorate:
          type: string
          maxLength: 50
          description: One of Oman's 11 governorates (English name).
          example: "Muscat"
        wilayat:
          type: string
          maxLength: 50
          example: "Seeb"
        village:
          type: string
          nullable: true
          maxLength: 80
        street:
          type: string
          nullable: true
          maxLength: 120
        buildingNumber:
          type: string
          nullable: true
          maxLength: 20
        postalCode:
          type: string
          nullable: true
          maxLength: 10
        mobile:
          type: string
          maxLength: 20
          example: "+96891234567"
        email:
          type: string
          nullable: true
          maxLength: 120
        passportNumber:
          type: string
          nullable: true
          maxLength: 20
        passportType:
          nullable: true
          allOf: [{ $ref: "#/components/schemas/PassportType" }]
        passportIssueDate:
          type: string
          format: date
          nullable: true
        passportExpiryDate:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true
          maxLength: 1000

    DecisionRequest:
      type: object
      description: A reviewer's approve/reject decision on an under-review enrollment.
      required: [approved]
      properties:
        approved:
          type: boolean
          description: True to approve the application, false to reject it.
          example: true
        notes:
          type: string
          nullable: true
          maxLength: 1000
          description: Reviewer's reasoning — required when rejecting, optional when approving.
          example: "Photo does not match the registry record."

    ReviewTask:
      type: object
      description: One item in the reviewer's work queue — its enrollment (carrying status + assignee).
      required: [queuedAtUtc, enrollment]
      properties:
        assignee:
          type: string
          nullable: true
          description: Reviewer who has claimed it, or null while it sits unassigned in the queue.
        queuedAtUtc:
          type: string
          format: date-time
          description: When it entered the queue / was last touched.
        enrollment:
          $ref: "#/components/schemas/Enrollment"

    CardTask:
      type: object
      description: One card in production or awaiting collection, with its applicant details.
      properties:
        idCardId:
          type: integer
          format: int64
        cardNumber:
          type: string
        civilNumber:
          type: string
        cardType:
          $ref: "#/components/schemas/CardType"
        status:
          $ref: "#/components/schemas/CardStatus"
        enrollmentId:
          type: string
          format: uuid
        referenceNumber:
          type: string
        firstNameEn:
          type: string
        familyNameEn:
          type: string
        firstNameAr:
          type: string
        familyNameAr:
          type: string
        enrollmentType:
          $ref: "#/components/schemas/EnrollmentType"

    Notification:
      type: object
      description: One staff notification written by the enrollment review workflow.
      required: [id, kind, messageEn, messageAr, createdAtUtc]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          description: Discriminator for icon/wording.
          enum: [review-queued, decided, escalated]
        enrollmentId:
          type: string
          format: uuid
          nullable: true
        referenceNumber:
          type: string
          nullable: true
        messageEn:
          type: string
        messageAr:
          type: string
        createdAtUtc:
          type: string
          format: date-time
        readAtUtc:
          type: string
          format: date-time
          nullable: true

    NotificationList:
      type: object
      description: The bell payload — latest notifications plus the unread total for the badge.
      required: [items, unreadCount]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        unreadCount:
          type: integer

    EnrollmentReport:
      type: object
      description: Aggregate enrollment-review KPIs over a rolling window of days.
      properties:
        windowDays:
          type: integer
        total:
          type: integer
        byStatus:
          type: object
          additionalProperties:
            type: integer
        byType:
          type: object
          additionalProperties:
            type: integer
        decided:
          type: integer
        autoApproved:
          type: integer
        humanDecided:
          type: integer
        approved:
          type: integer
        rejected:
          type: integer
        autoApprovalRatePct:
          type: number
        approvalRatePct:
          type: number
        avgHoursToDecision:
          type: number
          nullable: true
        escalated:
          type: integer
        escalationRatePct:
          type: number
        topFlags:
          type: array
          items:
            type: object
            properties:
              flag:
                type: string
              count:
                type: integer
        byReviewer:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
        daily:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              created:
                type: integer
              decided:
                type: integer

    EnrollmentSummary:
      type: object
      description: One row in the enrollment queue.
      required:
        - id
        - referenceNumber
        - firstNameEn
        - familyNameEn
        - firstNameAr
        - familyNameAr
        - nationalityCode
        - type
        - status
        - createdAtUtc
        - updatedAtUtc
      properties:
        id:
          type: string
          format: uuid
        referenceNumber:
          type: string
          example: "ENR-1A2B3C4D"
        civilNumber:
          type: string
          nullable: true
          example: "12345678"
        firstNameEn:
          type: string
        familyNameEn:
          type: string
        firstNameAr:
          type: string
        familyNameAr:
          type: string
        nationalityCode:
          type: string
          example: "OMN"
        type:
          $ref: "#/components/schemas/EnrollmentType"
        status:
          $ref: "#/components/schemas/EnrollmentStatus"
        assignedTo:
          type: string
          nullable: true
          description: Reviewer who has claimed it, or null while unassigned in the queue.
        riskLevel:
          type: string
          nullable: true
          enum: [HIGH, NORMAL]
          description: Screening's risk verdict; HIGH reviews are supervisor-only.
        createdAtUtc:
          type: string
          format: date-time
        updatedAtUtc:
          type: string
          format: date-time
        escalatedAtUtc:
          type: string
          format: date-time
          nullable: true
          description: Set when the review breached its SLA and a supervisor was notified.

    Enrollment:
      description: Full enrollment application.
      allOf:
        - $ref: "#/components/schemas/EnrollmentSummary"
        - type: object
          properties:
            dateOfBirth:
              type: string
              format: date
              example: "1990-05-14"
            gender:
              type: string
              nullable: true
              enum: [M, F]
              description: Captured so an approved new applicant can be registered as a person.
            placeOfBirthEn: { type: string, nullable: true }
            placeOfBirthAr: { type: string, nullable: true }
            motherNameEn: { type: string, nullable: true }
            motherNameAr: { type: string, nullable: true }
            maritalStatus:
              nullable: true
              allOf: [{ $ref: "#/components/schemas/MaritalStatus" }]
            bloodType: { type: string, nullable: true }
            occupationEn: { type: string, nullable: true }
            occupationAr: { type: string, nullable: true }
            governorate: { type: string, nullable: true }
            wilayat: { type: string, nullable: true }
            village: { type: string, nullable: true }
            street: { type: string, nullable: true }
            buildingNumber: { type: string, nullable: true }
            postalCode: { type: string, nullable: true }
            mobile: { type: string, nullable: true }
            email: { type: string, nullable: true }
            passportNumber: { type: string, nullable: true }
            passportType:
              nullable: true
              allOf: [{ $ref: "#/components/schemas/PassportType" }]
            passportIssueDate: { type: string, format: date, nullable: true }
            passportExpiryDate: { type: string, format: date, nullable: true }
            notes:
              type: string
              nullable: true
            createdBy:
              type: string
              description: Operator who created the application.
              example: "operator1"
            assignedAtUtc:
              type: string
              format: date-time
              nullable: true
              description: When the current assignee claimed it; null while unassigned.
            decidedBy:
              type: string
              nullable: true
              description: Who decided — a reviewer's username, or "auto-screening".
            decidedAtUtc:
              type: string
              format: date-time
              nullable: true
            decisionNotes:
              type: string
              nullable: true
              description: Reviewer's reasoning — always present for rejections.
            screeningFlags:
              type: array
              description: Why automated screening routed this to a human (empty when clean).
              items:
                type: string
                enum:
                  - CRN_NOT_FOUND
                  - REGISTRY_RECORD_NOT_ACTIVE
                  - NAME_MISMATCH
                  - DUPLICATE_PENDING
                  - MINOR_APPLICANT
            correctionNote:
              type: string
              nullable: true
              description: Reviewer's note on what to fix, while the application awaits corrections.

    PagedResultOfEnrollmentSummary:
      type: object
      required: [items, totalCount, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EnrollmentSummary"
        totalCount:
          type: integer
          format: int32
        page:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32

    ProblemDetails:
      type: object
      description: RFC 7807 problem details for error responses.
      properties:
        type:
          type: string
          example: "https://tools.ietf.org/html/rfc7231#section-6.5.1"
        title:
          type: string
          example: "One or more validation errors occurred."
        status:
          type: integer
          format: int32
          example: 400
        detail:
          type: string
          example: "pageSize must be between 1 and 100."
        instance:
          type: string
          example: "/api/v1/persons/search"

    Gender:
      type: string
      enum: [M, F]

    PersonStatus:
      type: string
      enum: [ACTIVE, DECEASED, MERGED]

    MaritalStatus:
      type: string
      nullable: true
      enum: [SINGLE, MARRIED, DIVORCED, WIDOWED]

    CardStatus:
      type: string
      enum: [IN_PRODUCTION, READY_FOR_COLLECTION, ACTIVE, EXPIRED, SUPERSEDED, BLOCKED, LOST]

    CardType:
      type: string
      enum: [OMANI, RESIDENT, GCC, INVESTOR]

    PassportType:
      type: string
      enum: [ORDINARY, DIPLOMATIC, SERVICE, SPECIAL, ROYAL_DIPLOMATIC]

    PassportStatus:
      type: string
      enum: [ACTIVE, EXPIRED, CANCELLED, LOST, STOLEN]

    EnrollmentType:
      type: string
      enum: [NEW_CARD, RENEWAL, REPLACEMENT, CORRECTION]

    EnrollmentStatus:
      type: string
      enum:
        - DRAFT
        - SUBMITTED
        - PENDING_REVIEW
        - UNDER_REVIEW
        - NEEDS_CORRECTION
        - APPROVED
        - REJECTED
        - WITHDRAWN
