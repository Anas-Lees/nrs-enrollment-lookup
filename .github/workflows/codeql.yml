name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly deep scan (Mondays 03:00 UTC).
    - cron: '0 3 * * 1'

permissions:
  contents: read
  # CodeQL's status reporting calls the Actions API even with upload:false.
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Code scanning (Security tab) needs GitHub Advanced Security, which isn't
      # available on this private repo. So we run the analysis and publish the SARIF
      # as an artifact instead of uploading it. To light up the Security tab once the
      # repo is public (or GHAS is enabled), drop `upload: false` and the artifact step.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
          upload: false
          output: codeql-results-${{ matrix.language }}

      - name: Upload CodeQL SARIF (artifact)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ matrix.language }}
          path: codeql-results-${{ matrix.language }}
          retention-days: 7
