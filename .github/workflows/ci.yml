name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend · build, test, coverage, scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test (+ coverage)
        run: >
          dotnet test --no-build -c Release --verbosity normal
          --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/TestResults/**/coverage.cobertura.xml
          retention-days: 7

      - name: Security scan (vulnerable packages, fail on High/Critical)
        run: |
          dotnet list package --vulnerable --include-transitive --format json > vuln.json || true
          python3 "$GITHUB_WORKSPACE/.github/scripts/check-vulnerabilities.py" vuln.json

  frontend:
    name: Frontend · format, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Format check (Prettier)
        run: npx prettier --check "src/**/*.{ts,html,scss,json}"

      - name: Unit tests (Vitest)
        run: npx ng test --watch=false

      - name: Build
        run: npm run build

  e2e:
    name: E2E · operator journey
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # The e2e job boots the real API, which runs on Oracle in every environment. Provide a
    # throwaway Oracle XE the way docker-compose does (least-privilege nrs_app account).
    services:
      oracle:
        image: gvenzl/oracle-xe:21-slim
        env:
          ORACLE_PASSWORD: nrs_dev_password
          APP_USER: nrs_app
          APP_USER_PASSWORD: nrs_app_password
        ports:
          - 1521:1521
        options: >-
          --health-cmd healthcheck.sh
          --health-interval 10s
          --health-timeout 10s
          --health-retries 40
          --health-start-period 90s
    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright (chromium)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e (boots API + SPA)
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
