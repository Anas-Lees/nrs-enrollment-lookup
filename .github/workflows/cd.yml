name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-push:
    name: Build & push images (GHCR)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: ./backend
          - name: spa
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}-${{ matrix.name }}:latest
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          # Report (don't fail the build) for this POC; raise to 1 to enforce.
          exit-code: '0'

      - name: Upload Trivy results to Security tab
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      - name: Generate + upload SBOM (SPDX)
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ghcr.io/${{ github.repository }}-${{ matrix.name }}:latest
          format: spdx-json
          artifact-name: sbom-${{ matrix.name }}.spdx.json

  # Deployment to OpenShift is a documented manual step (no cluster is wired in this
  # POC) — see deploy/openshift/README.md. Re-add a deploy job here once an
  # OPENSHIFT_SERVER variable and OPENSHIFT_TOKEN secret are configured.
