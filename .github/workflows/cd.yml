name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & push images (GHCR)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: ./backend
          - name: spa
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # GHCR image names must be lowercase; github.repository may contain uppercase.
      - name: Resolve lowercase image ref
        id: img
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}-${{ matrix.name }}:latest" >> "$GITHUB_OUTPUT"

      # Image scanning + SBOM are advisory: the images are already pushed above, so a
      # scanner hiccup must never block delivery (continue-on-error).
      - name: Trivy image scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.ref }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      # Security tab needs GHAS (unavailable on this private repo), so publish the
      # Trivy SARIF as an artifact. Switch to github/codeql-action/upload-sarif once
      # the repo is public or GHAS is enabled.
      - name: Upload Trivy results (artifact)
        if: ${{ hashFiles(format('trivy-{0}.sarif', matrix.name)) != '' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.name }}
          path: trivy-${{ matrix.name }}.sarif
          retention-days: 7

      - name: Generate + upload SBOM (SPDX)
        continue-on-error: true
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ steps.img.outputs.ref }}
          format: spdx-json
          artifact-name: sbom-${{ matrix.name }}.spdx.json

  # Deployment to OpenShift is a documented manual step (no cluster is wired in this
  # POC) — see deploy/openshift/README.md. Re-add a deploy job here once an
  # OPENSHIFT_SERVER variable and OPENSHIFT_TOKEN secret are configured.
