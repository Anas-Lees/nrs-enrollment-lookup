name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & push images (GHCR)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: ./backend
          - name: spa
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to OpenShift
    runs-on: ubuntu-latest
    needs: build-push
    # Runs only when an OpenShift target is configured (repo variable). Skipped otherwise.
    if: ${{ vars.OPENSHIFT_SERVER != '' }}
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Install oc
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Log in to OpenShift
        run: oc login "${{ vars.OPENSHIFT_SERVER }}" --token="${{ secrets.OPENSHIFT_TOKEN }}"

      - name: Apply manifests
        run: oc apply -f deploy/openshift/

      - name: Roll out
        run: |
          oc rollout status deployment/nrs-api --timeout=180s
          oc rollout status deployment/nrs-spa --timeout=180s
