apiVersion: apps/v1
kind: Deployment
metadata:
  name: nrs-spa
  labels:
    app: nrs
    component: spa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nrs
      component: spa
  template:
    metadata:
      labels:
        app: nrs
        component: spa
    spec:
      containers:
        - name: spa
          image: ghcr.io/anas-lees/nrs-enrollment-lookup-spa:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            # Override the baked nginx config so /api targets the nrs-api Service.
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: nrs-spa-nginx
