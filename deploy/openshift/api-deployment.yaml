apiVersion: apps/v1
kind: Deployment
metadata:
  name: nrs-api
  labels:
    app: nrs
    component: api
spec:
  # The API is stateless; it scales horizontally. In this POC each replica seeds
  # its own pod-local SQLite from the same deterministic dataset, so replicas serve
  # identical, read-only data. Production points all replicas at a shared Oracle.
  replicas: 2
  selector:
    matchLabels:
      app: nrs
      component: api
  template:
    metadata:
      labels:
        app: nrs
        component: api
    spec:
      # Dedicated SA with no API-token automount — the workload never calls the cluster API.
      serviceAccountName: nrs-api
      automountServiceAccountToken: false
      # Pod-level hardening. No numeric runAsUser/fsGroup: OpenShift's restricted SCC
      # assigns a random non-root UID (group 0), and the image's /app/data is group-0
      # writable, so this stays portable across clusters.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/anas-lees/nrs-enrollment-lookup-api:latest
          imagePullPolicy: Always
          # Container-level hardening: no privilege escalation, all caps dropped,
          # read-only root filesystem (writable paths are explicit emptyDir mounts).
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          # Non-secret config (env, URLs, provider toggle, POC SQLite path) comes
          # from the ConfigMap. Credentials are injected key-by-key from the
          # nrs-secrets Secret below — never via envFrom of the whole Secret, and
          # never from the ConfigMap.
          envFrom:
            - configMapRef:
                name: nrs-api-config
          env:
            # --- Secrets from nrs-secrets (see secret.yaml) ---
            # Injected per-key via secretKeyRef so the pod spec lists exactly which
            # secret values it consumes. optional:true keeps the POC bootable when
            # the Secret is absent (the demo runs on pod-local SQLite + auth off);
            # for production, populate nrs-secrets and flip optional to false.
            #
            # Keycloak/OIDC confidential-client secret. Only meaningful if a
            # confidential-client flow is enabled; harmless to inject otherwise.
            - name: Auth__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: nrs-secrets
                  key: Auth__ClientSecret
                  optional: true
            # Standalone DB password (rotation / tooling convenience).
            - name: Database__Password
              valueFrom:
                secretKeyRef:
                  name: nrs-secrets
                  key: Database__Password
                  optional: true
            # Optional Redis connection string (may carry a password).
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: nrs-secrets
                  key: ConnectionStrings__Redis
                  optional: true
            # --- PRODUCTION (Oracle) OVERRIDE ---
            # Uncomment to source the real, credential-bearing Oracle connection
            # string from the Secret. An explicit env entry takes precedence over
            # the same key supplied by envFrom (the ConfigMap's POC SQLite value),
            # so this cleanly replaces it. Also set DatabaseProvider=Oracle in the
            # ConfigMap. Use optional:false in production so a missing Secret fails
            # fast instead of silently falling back.
            # - name: ConnectionStrings__Default
            #   valueFrom:
            #     secretKeyRef:
            #       name: nrs-secrets
            #       key: ConnectionStrings__Default
            #       optional: false
          # startupProbe decouples slow cold starts (migrate + seed) from liveness, so a
          # slow boot can't trip a restart loop.
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
      volumes:
        # Ephemeral writable location for the pod-local SQLite database (POC).
        - name: data
          emptyDir: {}
        # .NET needs a writable temp dir under readOnlyRootFilesystem.
        - name: tmp
          emptyDir: {}
