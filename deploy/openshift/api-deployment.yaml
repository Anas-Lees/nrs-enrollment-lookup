apiVersion: apps/v1
kind: Deployment
metadata:
  name: nrs-api
  labels:
    app: nrs
    component: api
spec:
  # The API is stateless; it scales horizontally. In this POC each replica seeds
  # its own pod-local SQLite from the same deterministic dataset, so replicas serve
  # identical, read-only data. Production points all replicas at a shared Oracle.
  replicas: 2
  selector:
    matchLabels:
      app: nrs
      component: api
  template:
    metadata:
      labels:
        app: nrs
        component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/anas-lees/nrs-enrollment-lookup-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: nrs-api-config
            - secretRef:
                name: nrs-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        # Ephemeral writable location for the pod-local SQLite database (POC).
        - name: data
          emptyDir: {}
