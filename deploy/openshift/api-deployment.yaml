apiVersion: apps/v1
kind: Deployment
metadata:
  name: nrs-api
  labels:
    app: nrs
    component: api
spec:
  # The API is stateless; it scales horizontally. Every replica points at the same
  # shared Oracle database (connection string injected from the nrs-secrets Secret).
  replicas: 2
  selector:
    matchLabels:
      app: nrs
      component: api
  template:
    metadata:
      labels:
        app: nrs
        component: api
    spec:
      # Dedicated SA with no API-token automount — the workload never calls the cluster API.
      serviceAccountName: nrs-api
      automountServiceAccountToken: false
      # Pod-level hardening. No numeric runAsUser/fsGroup: OpenShift's restricted SCC
      # assigns a random non-root UID (group 0); the root filesystem is read-only and the
      # only writable path is an explicit emptyDir for /tmp, so this stays portable.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/anas-lees/nrs-enrollment-lookup-api:latest
          imagePullPolicy: Always
          # Container-level hardening: no privilege escalation, all caps dropped,
          # read-only root filesystem (writable paths are explicit emptyDir mounts).
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          # Non-secret config (env, URLs) comes from the ConfigMap. Credentials are
          # injected key-by-key from the nrs-secrets Secret below — never via envFrom
          # of the whole Secret, and never from the ConfigMap.
          envFrom:
            - configMapRef:
                name: nrs-api-config
          env:
            # --- Secrets from nrs-secrets (see secret.yaml) ---
            # Injected per-key via secretKeyRef so the pod spec lists exactly which
            # secret values it consumes. Populate nrs-secrets before applying: the
            # Oracle connection string is required (optional:false); the rest are
            # optional conveniences.
            #
            # The Oracle connection string (with its embedded password). Required — a
            # missing Secret should fail fast, not boot the API half-configured.
            - name: ConnectionStrings__Default
              valueFrom:
                secretKeyRef:
                  name: nrs-secrets
                  key: ConnectionStrings__Default
                  optional: false
            # Keycloak/OIDC confidential-client secret. Only meaningful if a
            # confidential-client flow is enabled; harmless to inject otherwise.
            - name: Auth__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: nrs-secrets
                  key: Auth__ClientSecret
                  optional: true
            # Standalone DB password (rotation / tooling convenience).
            - name: Database__Password
              valueFrom:
                secretKeyRef:
                  name: nrs-secrets
                  key: Database__Password
                  optional: true
            # Optional Redis connection string (may carry a password).
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: nrs-secrets
                  key: ConnectionStrings__Redis
                  optional: true
          # startupProbe decouples slow cold starts (migrate + seed) from liveness, so a
          # slow boot can't trip a restart loop.
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # .NET needs a writable temp dir under readOnlyRootFilesystem.
        - name: tmp
          emptyDir: {}
