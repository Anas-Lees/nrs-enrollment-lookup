# Dedicated service accounts so the API and SPA don't share the namespace 'default'
# SA, and so no Kubernetes API token is auto-mounted into either pod (neither workload
# talks to the cluster API — least privilege).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nrs-api
  labels:
    app: nrs
    component: api
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nrs-spa
  labels:
    app: nrs
    component: spa
automountServiceAccountToken: false
