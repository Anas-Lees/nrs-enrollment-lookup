# Non-secret configuration for the API and the SPA's nginx.
#
# SECRETS DO NOT BELONG HERE. Anything credential-shaped (the Oracle connection
# string with its embedded password, Redis password, Keycloak client secret)
# lives in the nrs-secrets Secret (see secret.yaml) and is injected into the API
# via env.valueFrom.secretKeyRef in api-deployment.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nrs-api-config
  labels:
    app: nrs
    component: api
data:
  # Run production-shaped (no developer exception page / no anonymous API docs). Seeding
  # defaults OFF under Production, so this demo opts in explicitly via Database__SeedOnStartup
  # — exactly as the docker-compose stack does.
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  Database__SeedOnStartup: "true"

  # Database provider selector (non-secret). "Sqlite" is the POC default; each
  # replica uses its own pod-local SQLite below. For a real registry set this to
  # "Oracle" AND switch the Deployment to inject ConnectionStrings__Default from
  # the nrs-secrets Secret (the credential-bearing Oracle string) — see the
  # commented secretKeyRef block in api-deployment.yaml.
  DatabaseProvider: "Sqlite"

  # POC-only connection string: a local SQLite *file path*, not a credential, so
  # it is safe to keep in the ConfigMap. NOTE: only used while DatabaseProvider
  # is "Sqlite". For Oracle this key is supplied by the Secret instead — do NOT
  # add an Oracle/credentialed connection string here.
  ConnectionStrings__Default: "Data Source=/app/data/nrs.db"
---
# nginx site config for the SPA pod. Overrides the image's baked default.conf so
# /api proxies to the in-cluster API Service (nrs-api) instead of the compose name.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nrs-spa-nginx
  labels:
    app: nrs
    component: spa
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        location /api/ {
            proxy_pass http://nrs-api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
