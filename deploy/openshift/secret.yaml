# Templated secret for the production dependencies (Oracle, Keycloak).
# These are PLACEHOLDERS — never commit real credentials. In a real cluster,
# inject them via OpenShift Secrets, HashiCorp Vault, or Sealed Secrets.
# The POC API uses SQLite (see the ConfigMap), so it does not consume these yet.
apiVersion: v1
kind: Secret
metadata:
  name: nrs-secrets
  labels:
    app: nrs
type: Opaque
stringData:
  ConnectionStrings__Oracle: "User Id=NRS_APP;Password=CHANGE_ME;Data Source=//oracle:1521/XEPDB1"
  Keycloak__ClientSecret: "CHANGE_ME"
