# =============================================================================
# nrs-secrets — Opaque Secret for the NRS API's sensitive configuration.
# -----------------------------------------------------------------------------
# SECURITY: The values below are PLACEHOLDERS (REPLACE_ME). This file is a
# TEMPLATE and MUST NOT contain real credentials — never commit live secrets.
#
# In a real OpenShift/Kubernetes cluster the real values are supplied by a
# secrets manager and are NEVER stored in git:
#   * Bitnami Sealed Secrets  — commit an encrypted SealedSecret; the controller
#                               decrypts it into this Secret in-cluster.
#   * HashiCorp Vault         — via the Vault Agent injector or the Secrets
#                               Store CSI driver (vault provider).
#   * External Secrets Operator — sync from Vault / AWS SM / Azure KV / GCP SM.
#   * `oc create secret generic nrs-secrets --from-literal=...` (manual, ad hoc).
#
# Keys use the ASP.NET Core double-underscore convention so they bind to
# hierarchical config (e.g. ConnectionStrings__Default -> ConnectionStrings:Default).
# The api Deployment consumes specific keys via env.valueFrom.secretKeyRef
# (see api-deployment.yaml) — NOT envFrom of the whole Secret.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: nrs-secrets
  labels:
    app: nrs
    component: api
type: Opaque
stringData:
  # ---------------------------------------------------------------------------
  # Database — the production Oracle connection string.
  # Bound by the API via configuration.GetConnectionString("Default") when
  # DatabaseProvider=Oracle (a non-secret toggle kept in the ConfigMap).
  # The embedded Password is the credential, so the whole string lives here, not
  # in the ConfigMap. Format: Oracle.ManagedDataAccess connection string.
  # ---------------------------------------------------------------------------
  ConnectionStrings__Default: "User Id=NRS_APP;Password=REPLACE_ME;Data Source=//oracle-host:1521/XEPDB1"

  # Standalone DB password — provided for tooling/rotation that prefers the
  # password on its own (e.g. composing the connection string elsewhere, or a
  # Vault template). Keep it in sync with the Password= field above.
  Database__Password: "REPLACE_ME"

  # Optional: Redis connection string (cache / rate-limit / data-protection
  # backplane). Bound via GetConnectionString("Redis"); only wired in the
  # Deployment if you actually run Redis — may contain a password.
  ConnectionStrings__Redis: "REPLACE_ME"

  # ---------------------------------------------------------------------------
  # Keycloak / OIDC client secret.
  # The API is a bearer-token *resource server* and validates JWTs against the
  # realm's public keys, so it does NOT need a client secret for that path.
  # This is here only if you add a confidential-client flow (e.g. the API calls
  # Keycloak's admin/token endpoint, or back-channel logout). Leave as-is and
  # unwired otherwise. Non-secret OIDC settings (Authority, Audience) stay in
  # the ConfigMap.
  # ---------------------------------------------------------------------------
  Auth__ClientSecret: "REPLACE_ME"
