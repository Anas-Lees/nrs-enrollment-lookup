# Template ONLY — not wired into any pod. The POC API runs on pod-local SQLite, so the
# api Deployment no longer injects this secret (that dead envFrom was removed during
# hardening). Kept as a reference for the Oracle/Keycloak production path: when the app
# actually consumes these, mount the specific keys via env.valueFrom.secretKeyRef (or a
# file-mounted volume) rather than envFrom of the whole Secret.
# These are PLACEHOLDERS — never commit real credentials. In a real cluster, inject them
# via OpenShift Secrets, HashiCorp Vault, or Sealed Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: nrs-secrets
  labels:
    app: nrs
type: Opaque
stringData:
  ConnectionStrings__Oracle: "User Id=NRS_APP;Password=CHANGE_ME;Data Source=//oracle:1521/XEPDB1"
  Keycloak__ClientSecret: "CHANGE_ME"
