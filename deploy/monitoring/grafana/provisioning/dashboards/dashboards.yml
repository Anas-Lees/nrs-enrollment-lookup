# Grafana dashboard provider: load any dashboard JSON dropped into the mounted folder.
apiVersion: 1

providers:
  - name: NRS
    orgId: 1
    folder: NRS
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
