# OpenTelemetry Collector config for the local NRS observability stack.
#
# Flow:
#   API (nrs-api) --OTLP/gRPC:4317--> this collector
#     - metrics --> Prometheus exporter (scraped by Prometheus at :8889)
#     - traces  --> debug exporter (printed to the collector's stdout)
#
# Keep this minimal: it is a local demo, not a production pipeline.

receivers:
  # Accept OTLP from the API over gRPC (4317) and HTTP (4318).
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Batch before export to reduce per-export overhead.
  batch: {}

exporters:
  # Expose collected metrics in Prometheus format on :8889 for Prometheus to scrape.
  prometheus:
    endpoint: 0.0.0.0:8889
    # Surface OTel resource attributes (e.g. service.name) as metric labels.
    resource_to_telemetry_conversion:
      enabled: true

  # Print received traces to stdout (view with `docker compose logs -f otel-collector`).
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
