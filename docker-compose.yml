# Full local stack for the NRS Enrollment — Applicant Lookup feature.
#
#   docker compose up --build
#   open http://localhost:4200       # the SPA — redirects to Keycloak to log in
#   login: operator1 / operator1
#   open http://localhost:5000/scalar    # API reference (Scalar)
#   open http://localhost:8081       # Keycloak admin (admin / admin)
#
# This runs the production-shaped stack: Angular SPA (nginx) -> API (.NET) on an
# Oracle database, with Keycloak (OIDC/JWT) enforcing login and Redis caching hot
# profile reads (the API falls back to an in-memory cache when Redis is absent).
#
# Keycloak split-horizon: the browser reaches Keycloak at localhost:8081 while the
# API reaches it at keycloak:8080. KC_HOSTNAME fixes the token issuer to
# localhost:8081 and KC_HOSTNAME_BACKCHANNEL_DYNAMIC lets the API fetch keys via
# keycloak:8080 (Auth__MetadataAddress), so issuer validation lines up.

services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    environment:
      # SYS/SYSTEM password (admin only — the app does NOT use this).
      ORACLE_PASSWORD: nrs_dev_password
      # Least-privilege application account, auto-created in XEPDB1 by the image.
      # It owns its own schema (connect + create table/sequence + DML) — not a DBA.
      APP_USER: nrs_app
      APP_USER_PASSWORD: nrs_app_password
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8081
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      - ./deploy/keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
      # Custom ROP-branded login theme (referenced by the realm's loginTheme=nrs).
      - ./deploy/keycloak/themes:/opt/keycloak/themes:ro
    ports:
      - "8081:8080"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "5672:5672"     # AMQP — the API publishes/consumes enrollment events here
      - "15672:15672"   # management UI (guest / guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Run the production-shaped runtime config (JSON logs, no anonymous API docs).
      # Note: this demo is still seeded with SYNTHETIC data (below) — it is not a
      # production *data* posture.
      ASPNETCORE_ENVIRONMENT: Production
      # Demo stack: explicitly opt in to seeding synthetic registry data. Seeding defaults
      # OFF under Production, so this toggle is required here. NEVER set true against a real
      # registry database.
      Database__SeedOnStartup: "true"
      ASPNETCORE_URLS: http://+:8080
      # Expose the Scalar/OpenAPI docs in this demo stack, but behind operator auth.
      OpenApi__Enabled: "true"
      # Connect as the least-privilege app account, not SYSTEM/DBA.
      ConnectionStrings__Default: "User Id=nrs_app;Password=nrs_app_password;Data Source=oracle:1521/XEPDB1"
      # Distributed cache for hot profile reads (cache-aside; audit still fires per request).
      ConnectionStrings__Redis: "redis:6379"
      # Message broker for enrollment events: publish on create/edit, and the background
      # consumer advances a submitted enrollment to under-review.
      ConnectionStrings__RabbitMq: "amqp://guest:guest@rabbitmq:5672"
      Auth__Enabled: "true"
      Auth__Authority: http://localhost:8081/realms/nrs
      Auth__Audience: nrs-api
      Auth__MetadataAddress: http://keycloak:8080/realms/nrs/.well-known/openid-configuration
      # Keycloak is reached over internal plain HTTP in this stack.
      Auth__RequireHttpsMetadata: "false"
      # Observability: the API only emits OTel traces+metrics when an OTLP endpoint
      # is set. Point it at the local collector over gRPC (4317).
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    ports:
      - "5000:8080"
    depends_on:
      oracle:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      # curl is installed in the API image; hit the anonymous readiness endpoint.
      # Generous start_period: the API waits for Oracle, then migrates + seeds on boot.
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

  # --- Local observability stack -------------------------------------------------
  # Collects the OTel data the API emits (see OTEL_* env on the api service) and
  # makes it viewable: traces -> collector logs, metrics -> Prometheus -> Grafana.

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deploy/monitoring/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (from the API)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter (scraped by Prometheus)

  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      # Local-only convenience: skip the login screen.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started

  spa:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:8080"
    volumes:
      # Runtime config: enable Keycloak login for the containerised SPA.
      - ./deploy/spa-config.docker.json:/usr/share/nginx/html/config.json:ro
    depends_on:
      # Wait for the API to be healthy (serving), not merely started, so the SPA never
      # proxies to a not-yet-ready backend on first boot.
      api:
        condition: service_healthy

volumes:
  oracle-data:
  grafana-data:
