# Full local stack for the NRS Enrollment — Applicant Lookup feature.
#
#   docker compose up --build
#   open http://localhost:4200       # the SPA — redirects to Keycloak to log in
#   login: operator1 / operator1
#   open http://localhost:5000/swagger
#   open http://localhost:8081       # Keycloak admin (admin / admin)
#
# This runs the production-shaped stack: Angular SPA (nginx) -> API (.NET) on an
# Oracle database, with Keycloak (OIDC/JWT) enforcing login. Redis is included as
# the platform cache placeholder.
#
# Keycloak split-horizon: the browser reaches Keycloak at localhost:8081 while the
# API reaches it at keycloak:8080. KC_HOSTNAME fixes the token issuer to
# localhost:8081 and KC_HOSTNAME_BACKCHANNEL_DYNAMIC lets the API fetch keys via
# keycloak:8080 (Auth__MetadataAddress), so issuer validation lines up.

services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    environment:
      ORACLE_PASSWORD: nrs_dev_password
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8081
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      - ./deploy/keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "8081:8080"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DatabaseProvider: Oracle
      ConnectionStrings__Default: "User Id=system;Password=nrs_dev_password;Data Source=oracle:1521/XEPDB1"
      Auth__Enabled: "true"
      Auth__Authority: http://localhost:8081/realms/nrs
      Auth__Audience: nrs-api
      Auth__MetadataAddress: http://keycloak:8080/realms/nrs/.well-known/openid-configuration
    ports:
      - "5000:8080"
    depends_on:
      oracle:
        condition: service_healthy

  spa:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:8080"
    volumes:
      # Runtime config: enable Keycloak login for the containerised SPA.
      - ./deploy/spa-config.docker.json:/usr/share/nginx/html/config.json:ro
    depends_on:
      - api

volumes:
  oracle-data:
